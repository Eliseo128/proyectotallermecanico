name: proyectotallermecanico
description: App de gestión para Taller Mecánico con Flutter y Firebase

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.0
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.14.0

  # State Management
  provider: ^6.1.0

  # UI & Navigation
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  intl: ^0.19.0

  # Validation
  email_validator: ^2.1.17

  # Logging
  logger: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
